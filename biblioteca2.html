<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Videos Musicales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primario: '#d946ef',
                        oscuro: '#121212',
                    }
                }
            }
        }
    </script>
    <style>
        .ventana-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease;
        }

        .ventana-video.activa {
            opacity: 1;
            visibility: visible;
        }

        .ventana-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .boton-cerrar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .boton-cerrar.visible {
            display: flex;
        }

        .boton-cerrar:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* Controles principales de la ventana completa */
        .controles-video {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 20px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
            width: 90%;
            max-width: 500px;
        }

        .controles-video.show {
            opacity: 1;
        }

        /* Barra de progreso en ventana completa */
        .barra-progreso-completa {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .barra-contenedor-completa {
            width: 100%;
            height: 4px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .barra-progreso-completa-fill {
            height: 100%;
            background: linear-gradient(90deg, #d946ef, #ff6b9d);
            width: 0%;
            transition: width 0.2s ease;
            border-radius: 2px;
        }

        .tiempos-completos {
            width: 100%;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .controles-botones {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .controles-video button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }

        .controles-video button:hover {
            transform: scale(1.1);
            color: #d946ef;
        }

        .boton-play-pausa-grande {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        @media (max-width: 480px) {
            .controles-video {
                padding: 12px;
            }
            .controles-botones {
                gap: 18px;
            }
        }

        @media (min-width: 1024px) {
            .controles-video {
                max-width: 600px;
            }
        }
    </style>
</head>
<body class="bg-oscuro min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Biblioteca -->
        <div class="mb-6">
            <h2 class="text-white text-2xl font-bold mb-4">Tu Biblioteca</h2>
            <div class="space-y-3">
                <div class="bg-primario/90 rounded-lg p-4 cursor-pointer cancion-item transition-all" data-indice="0">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-film text-white text-xl"></i>
                        <div>
                            <h3 class="text-white font-semibold">Piel Canela</h3>
                            <p class="text-white/80 text-sm">Cuco</p>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-gray-700 transition cancion-item" data-indice="1">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-film text-gray-400 text-xl"></i>
                        <div>
                            <h3 class="text-white font-semibold">Materia Gris</h3>
                            <p class="text-gray-400 text-sm">El Rique</p>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-gray-700 transition cancion-item" data-indice="2">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-film text-gray-400 text-xl"></i>
                        <div>
                            <h3 class="text-white font-semibold">Lento</h3>
                            <p class="text-gray-400 text-sm">Santy-P</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Volumen -->
        <div class="bg-gray-800 rounded-lg p-4 mb-6">
            <h3 class="text-white font-semibold mb-3">Control de Volumen</h3>
            <div class="flex items-center gap-3">
                <i id="icono-volumen" class="fa fa-volume-up text-white"></i>
                <input id="control-volumen" type="range" min="0" max="100" value="70" class="flex-1 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primario">
                <span id="valor-volumen" class="text-white">70</span>
            </div>
        </div>

        <!-- Reproductor SIMPLIFICADO SIN CUADRO NEGRO -->
        <div class="bg-gray-800 rounded-lg p-6">
            <div class="text-center mb-8">
                <h3 id="titulo-cancion" class="text-white text-xl font-semibold">Piel Canela</h3>
                <p id="artista-cancion" class="text-gray-400">Cuco</p>
            </div>

            <!-- BARRA DE PROGRESO ARRIBA DE BOTONES -->
            <div class="mb-6">
                <div id="barra-contenedor" class="h-2 bg-gray-700 rounded-lg overflow-hidden relative cursor-pointer">
                    <div id="barra-progreso" class="h-full bg-primario w-0 transition-all duration-200"></div>
                </div>
                <div class="flex justify-between text-gray-400 text-sm mt-1">
                    <span id="tiempo-actual">0:00</span>
                    <span id="tiempo-total">1:43</span>
                </div>
            </div>

            <!-- BOTONES -->
            <div class="flex items-center justify-center gap-8">
                <button id="boton-retroceder" class="text-white text-2xl hover:text-primario transition">
                    <i class="fa fa-step-backward"></i>
                </button>
                <button id="boton-play" class="w-16 h-16 rounded-full bg-white text-oscuro flex items-center justify-center text-2xl hover:scale-105 transition">
                    <i class="fa fa-play"></i>
                </button>
                <button id="boton-adelantar" class="text-white text-2xl hover:text-primario transition">
                    <i class="fa fa-step-forward"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Ventana completa CON BARRA DE PROGRESO -->
    <div id="ventana-video" class="ventana-video">
        <button id="boton-cerrar" class="boton-cerrar">
            <i class="fa fa-times"></i>
        </button>
        <video id="video-reproductor" preload="metadata" playsinline>
            <source src="piel-canela.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
        
        <!-- ✅ NUEVA BARRA DE PROGRESO EN PANTALLA COMPLETA -->
        <div class="controles-video" id="controles-video">
            <div class="barra-progreso-completa">
                <div class="barra-contenedor-completa" id="barra-completa-contenedor">
                    <div class="barra-progreso-completa-fill" id="barra-completa-progreso"></div>
                </div>
                <div class="tiempos-completos">
                    <span id="tiempo-actual-completo">0:00</span>
                    <span id="tiempo-total-completo">1:43</span>
                </div>
            </div>
            <div class="controles-botones">
                <button id="video-retroceder"><i class="fa fa-step-backward"></i></button>
                <button id="video-play-pausa" class="boton-play-pausa-grande"><i class="fa fa-play"></i></button>
                <button id="video-adelantar"><i class="fa fa-step-forward"></i></button>
            </div>
        </div>
    </div>

    <script>
        const listaCanciones = [
            {titulo: "Piel Canela", artista: "Cuco", archivo: "piel-canela.mp4", duracion: 102},
            {titulo: "Materia Gris", artista: "El Rique", archivo: "materia-gris.mp4", duracion: 181},
            {titulo: "Lento", artista: "Santy-P", archivo: "lento.mp4", duracion: 193}
        ];

        // Elementos DOM
        const ventanaVideo = document.getElementById('ventana-video');
        const video = document.getElementById('video-reproductor');
        const controlesVideo = document.getElementById('controles-video');
        const botonCerrar = document.getElementById('boton-cerrar');
        const botonPlay = document.getElementById('boton-play');
        const botonRetroceder = document.getElementById('boton-retroceder');
        const botonAdelantar = document.getElementById('boton-adelantar');
        const videoRetroceder = document.getElementById('video-retroceder');
        const videoPlayPausa = document.getElementById('video-play-pausa');
        const videoAdelantar = document.getElementById('video-adelantar');
        
        // Barras de progreso
        const barraProgreso = document.getElementById('barra-progreso');
        const barraContenedor = document.getElementById('barra-contenedor');
        const barraCompletaProgreso = document.getElementById('barra-completa-progreso');
        const barraCompletaContenedor = document.getElementById('barra-completa-contenedor');
        
        // Tiempos
        const tiempoActual = document.getElementById('tiempo-actual');
        const tiempoTotal = document.getElementById('tiempo-total');
        const tiempoActualCompleto = document.getElementById('tiempo-actual-completo');
        const tiempoTotalCompleto = document.getElementById('tiempo-total-completo');
        
        // Volumen
        const controlVolumen = document.getElementById('control-volumen');
        const valorVolumen = document.getElementById('valor-volumen');
        const iconoVolumen = document.getElementById('icono-volumen');
        const tituloCancion = document.getElementById('titulo-cancion');
        const artistaCancion = document.getElementById('artista-cancion');
        const itemsCanciones = document.querySelectorAll('.cancion-item');

        let estaReproduciendo = false;
        let indiceCancionActual = 0;
        const TIEMPO_SALTO = 10;
        let temporizadorControles;

        function formatearTiempo(segundos) {
            const min = Math.floor(segundos / 60);
            const seg = Math.floor(segundos % 60);
            return `${min}:${seg.toString().padStart(2, '0')}`;
        }

        function cargarCancion(indice) {
            const cancion = listaCanciones[indice];
            video.src = cancion.archivo;
            tituloCancion.textContent = cancion.titulo;
            artistaCancion.textContent = cancion.artista;
            tiempoTotal.textContent = formatearTiempo(cancion.duracion);
            tiempoTotalCompleto.textContent = formatearTiempo(cancion.duracion);
            
            resetProgreso();
            actualizarBotonesPlay(false);
            video.pause();
            botonCerrar.classList.remove('visible');
            controlesVideo.classList.remove('show');

            itemsCanciones.forEach((item, i) => {
                const icono = item.querySelector('i');
                if(i === indice) {
                    item.classList.add('bg-primario/90');
                    item.classList.remove('bg-gray-800');
                    icono.classList.add('text-white');
                    icono.classList.remove('text-gray-400');
                } else {
                    item.classList.remove('bg-primario/90');
                    item.classList.add('bg-gray-800');
                    icono.classList.remove('text-white');
                    icono.classList.add('text-gray-400');
                }
            });
        }

        function resetProgreso() {
            barraProgreso.style.width = "0%";
            barraCompletaProgreso.style.width = "0%";
            tiempoActual.textContent = "0:00";
            tiempoActualCompleto.textContent = "0:00";
        }

        function actualizarProgreso() {
            if (!video.duration) return;
            const progreso = (video.currentTime / video.duration) * 100;
            barraProgreso.style.width = `${progreso}%`;
            barraCompletaProgreso.style.width = `${progreso}%`;
            tiempoActual.textContent = formatearTiempo(video.currentTime);
            tiempoActualCompleto.textContent = formatearTiempo(video.currentTime);
        }

        function actualizarBotonesPlay(reproduciendo) {
            const iconoPlay = '<i class="fa fa-play"></i>';
            const iconoPausa = '<i class="fa fa-pause"></i>';
            if (reproduciendo) {
                botonPlay.innerHTML = iconoPausa;
                videoPlayPausa.innerHTML = iconoPausa;
            } else {
                botonPlay.innerHTML = iconoPlay;
                videoPlayPausa.innerHTML = iconoPlay;
            }
        }

        function mostrarControles() {
            controlesVideo.classList.add('show');
            botonCerrar.classList.add('visible');
            clearTimeout(temporizadorControles);
            temporizadorControles = setTimeout(() => {
                if (!video.paused && !video.ended) {
                    controlesVideo.classList.remove('show');
                    botonCerrar.classList.remove('visible');
                }
            }, 4000);
        }

        function abrirVentanaVideo() {
            ventanaVideo.classList.add('activa');
            video.play().then(() => {
                estaReproduciendo = true;
                actualizarBotonesPlay(true);
            }).catch(e => console.log('Error:', e));
        }

        function cerrarVentanaVideo() {
            video.pause();
            estaReproduciendo = false;
            ventanaVideo.classList.remove('activa');
            controlesVideo.classList.remove('show');
            botonCerrar.classList.remove('visible');
            actualizarBotonesPlay(false);
        }

        function actualizarIconoVolumen() {
            const vol = video.volume;
            if(vol === 0) iconoVolumen.className = "fa fa-volume-off text-white";
            else if(vol < 0.5) iconoVolumen.className = "fa fa-volume-down text-white";
            else iconoVolumen.className = "fa fa-volume-up text-white";
        }

        // EVENTOS
        botonPlay.addEventListener('click', () => {
            if (ventanaVideo.classList.contains('activa')) {
                video.pause();
                estaReproduciendo = false;
            } else {
                abrirVentanaVideo();
            }
            actualizarBotonesPlay(estaReproduciendo);
        });

        botonCerrar.addEventListener('click', cerrarVentanaVideo);

        videoPlayPausa.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                estaReproduciendo = true;
            } else {
                video.pause();
                estaReproduciendo = false;
            }
            actualizarBotonesPlay(estaReproduciendo);
        });

        [videoRetroceder, videoAdelantar, botonRetroceder, botonAdelantar].forEach((btn, i) => {
            btn.addEventListener('click', () => {
                video.currentTime = i % 2 === 0 
                    ? Math.max(0, video.currentTime - TIEMPO_SALTO)
                    : Math.min(video.duration || 0, video.currentTime + TIEMPO_SALTO);
            });
        });

        [barraContenedor, barraCompletaContenedor].forEach(barra => {
            barra.addEventListener('click', (e) => {
                const rect = barra.getBoundingClientRect();
                const posicion = e.clientX - rect.left;
                const porcentaje = posicion / rect.width;
                video.currentTime = porcentaje * (video.duration || 0);
            });
        });

        controlVolumen.addEventListener('input', () => {
            video.volume = controlVolumen.value / 100;
            valorVolumen.textContent = controlVolumen.value;
            actualizarIconoVolumen();
        });

        ventanaVideo.addEventListener('mousemove', mostrarControles);
        ventanaVideo.addEventListener('touchstart', mostrarControles);
        ['mousemove', 'touchstart', 'click'].forEach(event => {
            ventanaVideo.addEventListener(event, mostrarControles);
        });

        video.addEventListener('play', () => {
            estaReproduciendo = true;
            actualizarBotonesPlay(true);
            mostrarControles();
        });

        video.addEventListener('pause', () => {
            estaReproduciendo = false;
            actualizarBotonesPlay(false);
            controlesVideo.classList.add('show');
        });

        video.addEventListener('ended', () => {
            estaReproduciendo = false;
            actualizarBotonesPlay(false);
            controlesVideo.classList.add('show');
            botonCerrar.classList.add('visible');
        });

        video.addEventListener('timeupdate', actualizarProgreso);
        video.addEventListener('loadedmetadata', () => {
            tiempoTotal.textContent = formatearTiempo(video.duration);
            tiempoTotalCompleto.textContent = formatearTiempo(video.duration);
        });

        itemsCanciones.forEach(item => {
            item.addEventListener('click', () => {
                const nuevoIndice = parseInt(item.dataset.indice);
                if(nuevoIndice !== indiceCancionActual) {
                    indiceCancionActual = nuevoIndice;
                    cargarCancion(indiceCancionActual);
                    if (ventanaVideo.classList.contains('activa')) abrirVentanaVideo();
                }
            });
        });

        // Inicializar
        cargarCancion(0);
        video.volume = 0.7;
        actualizarIconoVolumen();
    </script>
</body>
</html>
