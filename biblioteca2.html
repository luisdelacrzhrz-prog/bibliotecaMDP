<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Música</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primario: '#d946ef',
                        oscuro: '#121212',
                    },
                    fontFamily: {
                        elegante: ['Georgia', 'serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
    @layer utilities {
        .contenido-visible {
            content-visibility: auto;
        }
        /* Aplicar transición suave a todos los elementos de letra */
        #letra-anterior, #texto-letra, #letra-siguiente {
    transition: all 1.2s cubic-bezier(00.5s, 0.25, 0.5, 25);
}

    }
</style>
</head>
<body class="bg-oscuro min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
    <!-- VISTA PRINCIPAL (MENÚ) -->
    <div id="vista-menu" class="w-full max-w-md z-10">
        <!-- Biblioteca y lista de canciones -->
        <div class="mb-6">
            <h2 class="text-white text-2xl font-bold mb-4">Tu Biblioteca</h2>
            <div class="space-y-3">
                <!-- Canción 1 -->
                <div class="bg-primario/90 rounded-lg p-4 cursor-pointer cancion-item" data-indice="0">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-music text-white text-xl"></i>
                        <div>
                            <h3 class="text-white font-semibold">Piel Canela</h3>
                            <p class="text-white/80 text-sm">Cuco</p>
                        </div>
                    </div>
                </div>
                <!-- Canción 2 -->
                <div class="bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-gray-700 transition cancion-item" data-indice="1">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-music text-gray-400 text-xl"></i>
                        <div>
                            <h3 class="text-white font-semibold">I Wanna Be Yours</h3>
                            <p class="text-gray-400 text-sm">Arctic Monkeys</p>
                        </div>
                    </div>
                </div>
                <!-- Canción 3 -->
                <div class="bg-gray-800 rounded-lg p-4 cursor-pointer hover:bg-gray-700 transition cancion-item" data-indice="2">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-music text-gray-400 text-xl"></i>
                        <div>
                            <h3 class="text-white font-semibold">JVKE</h3>
                            <p class="text-gray-400 text-sm">Arctic Monkeys</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Control de volumen -->
        <div class="bg-gray-800 rounded-lg p-4 mb-6">
            <h3 class="text-white font-semibold mb-3">Control de Volumen</h3>
            <div class="flex items-center gap-3">
                <i id="icono-volumen" class="fa fa-volume-up text-white"></i>
                <input id="control-volumen" type="range" min="0" max="100" value="70" class="flex-1 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-primario">
                <span id="valor-volumen" class="text-white">70</span>
            </div>
        </div>

        <!-- Reproductor miniatura en el menú -->
        <div class="bg-gray-800 rounded-lg p-6 relative">
            <div class="text-center mb-6">
                <h3 id="titulo-cancion-menu" class="text-white text-xl font-semibold">Piel Canela</h3>
                <p id="artista-cancion-menu" class="text-gray-400 text-xl">Cuco</p>
            </div>

            <!-- Barra de progreso -->
            <div class="mb-6">
                <div id="barra-contenedor-menu" class="h-1 bg-gray-700 rounded-full overflow-hidden relative cursor-pointer">
                    <div id="barra-progreso-menu" class="h-full bg-primario w-0 transition-all duration-100"></div>
                </div>
                <div class="flex justify-between text-gray-400 text-sm mt-2">
                    <span id="tiempo-actual-menu">0:00</span>
                    <span id="tiempo-total-menu">1:43</span>
                </div>
            </div>

            <!-- Botones de control -->
            <div class="flex items-center justify-center gap-6">
                <button id="boton-retroceder-menu" class="text-white text-2xl hover:text-primario transition">
                    <i class="fa fa-step-backward"></i>
                </button>
                <button id="boton-play-menu" class="w-16 h-16 rounded-full bg-white text-oscuro flex items-center justify-center text-2xl hover:scale-105 transition">
                    <i class="fa fa-play"></i>
                </button>
                <button id="boton-adelantar-menu" class="text-white text-2xl hover:text-primario transition">
                    <i class="fa fa-step-forward"></i>
                </button>
            </div>
        </div>
    </div>


    <!-- VISTA DE REPRODUCCIÓN COMPLETA -->
    <div id="vista-reproduccion" class="absolute inset-0 bg-black/95 flex flex-col items-center justify-center p-6 transform translate-x-full transition-transform duration-500 ease-in-out z-20">
        <div class="w-full max-w-md flex flex-col items-center text-center">
            <h2 id="titulo-cancion-grande" class="text-white text-4xl font-bold mb-3"></h2>
            <p id="artista-cancion-grande" class="text-gray-400 text-xl mb-8"></p>

            <!-- Contenedor de Letra -->
    <div id="contenedor-letra" class="h-40 overflow-hidden relative rounded-lg bg-black/30 p-4 mb-8 w-full flex flex-col justify-center items-center">
        <div id="letra-anterior" class="font-elegante text-xl text-white/40 mb-2"></div>
        <div id="texto-letra" class="font-elegante text-3xl text-white mb-2 letra-animada"></div>
        <div id="letra-siguiente" class="font-elegante text-xl text-white/40 mt-2"></div>
    </div>

            <!-- Barra de progreso -->
            <div class="w-full mb-8">
                <div id="barra-contenedor-grande" class="h-1 bg-gray-700 rounded-full overflow-hidden relative cursor-pointer">
                    <div id="barra-progreso-grande" class="h-full bg-primario w-0 transition-all duration-100"></div>
                </div>
                <div class="flex justify-between text-gray-400 text-sm mt-2">
                    <span id="tiempo-actual-grande">0:00</span>
                    <span id="tiempo-total-grande">1:43</span>
                </div>
            </div>

            <!-- Botones de control -->
            <div class="flex items-center justify-center gap-8 mb-12">
                <button id="boton-retroceder-grande" class="text-white text-3xl hover:text-primario transition">
                    <i class="fa fa-step-backward"></i>
                </button>
                <button id="boton-play-grande" class="w-20 h-20 rounded-full bg-white text-oscuro flex items-center justify-center text-3xl hover:scale-105 transition">
                    <i class="fa fa-play"></i>
                </button>
                <button id="boton-adelantar-grande" class="text-white text-3xl hover:text-primario transition">
                    <i class="fa fa-step-forward"></i>
                </button>
            </div>

            <!-- Botón Regresar -->
            <button id="boton-regresar" class="px-6 py-3 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition">
                Regresar
            </button>
        </div>
    </div>


    <!-- Elemento de audio -->
    <audio id="audio" preload="metadata">
        <source src="piel-canela.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    

    <script>
        // DATOS DE TODAS LAS CANCIONES
        const listaCanciones = [
            {
                titulo: "Piel Canela",
                artista: "Cuco",
                archivo: "piel-canela.mp3",
                duracion: 88,
                letra: [
                    [0, ""],
                    [17, "Que se quede el infinito sin estrellas"],
                    [21, "O que pierda el ancho mar su inmensidad"],
                    [25, "Pero el negro de tus ojos que no muera"],
                    [29, "Y el canela de tu piel se quede igual"],
                    [33, "Si perdiera el arcoíris su belleza"],
                    [37, "Y las flores su perfume y su color"],
                    [41, "No sería tan inmensa mi tristeza"],
                    [45, "Como aquella de quedarme sin tu amor"],
                    [49, "Me importas tú, y tú, y tú"],
                    [53, "Y solamente tú, y tú, y tú"],
                    [57, "Me importas tú, y tú, y tú"],
                    [61, "Y nadie más que tú"],
                    [65, "Me importas tú, y tú, y tú"],
                    [69, "Y solamente tú, y tú, y tú"],
                    [73, "Me importas tú, y tú, y tú"],
                    [77, "Y nadie más que tú"],
                    [85, ""]
                ]
            },
            {
                titulo: "I Wanna Be Yours",
                artista: "Arctic Monkeys",
                archivo: "i-wanna-be-yours.mp3",
                duracion: 240,
                letra: [
                    [0, ""],
                    [5, "I wanna be your vacuum cleaner"],
                    [10, "Breathing in your dust"],
                    // Agrega el resto de la letra con sus tiempos
                ]
            },
            {
                titulo: "JVKE",
                artista: "Arctic Monkeys",
                archivo: "jvke.mp3",
                duracion: 180,
                letra: [
                    [0, ""],
                    // Agrega letra y tiempos
                ]
            }
        ];
        // ELEMENTOS DEL DOM
        const audio = document.getElementById('audio');
        
        // Vistas
        const vistaMenu = document.getElementById('vista-menu');
        const vistaReproduccion = document.getElementById('vista-reproduccion');
        
        // Elementos del menú
        const botonPlayMenu = document.getElementById('boton-play-menu');
        const botonRetrocederMenu = document.getElementById('boton-retroceder-menu');
        const botonAdelantarMenu = document.getElementById('boton-adelantar-menu');
        const barraProgresoMenu = document.getElementById('barra-progreso-menu');
        const barraContenedorMenu = document.getElementById('barra-contenedor-menu');
        const tiempoActualMenu = document.getElementById('tiempo-actual-menu');
        const tiempoTotalMenu = document.getElementById('tiempo-total-menu');
        const tituloCancionMenu = document.getElementById('titulo-cancion-menu');
        const artistaCancionMenu = document.getElementById('artista-cancion-menu');
        const controlVolumen = document.getElementById('control-volumen');
        const valorVolumen = document.getElementById('valor-volumen');
        const iconoVolumen = document.getElementById('icono-volumen');
        const itemsCanciones = document.querySelectorAll('.cancion-item');

        // Elementos de la vista grande
        const botonPlayGrande = document.getElementById('boton-play-grande');
        const botonRetrocederGrande = document.getElementById('boton-retroceder-grande');
        const botonAdelantarGrande = document.getElementById('boton-adelantar-grande');
        const barraProgresoGrande = document.getElementById('barra-progreso-grande');
        const barraContenedorGrande = document.getElementById('barra-contenedor-grande');
        const tiempoActualGrande = document.getElementById('tiempo-actual-grande');
        const tiempoTotalGrande = document.getElementById('tiempo-total-grande');
        const tituloCancionGrande = document.getElementById('titulo-cancion-grande');
        const artistaCancionGrande = document.getElementById('artista-cancion-grande');
        const botonRegresar = document.getElementById('boton-regresar');
        const textoLetra = document.getElementById('texto-letra');


        // ESTADO GLOBAL
        let estaReproduciendo = false;
        let indiceCancionActual = 0;
        let indiceLetraActual = 0;
        const TIEMPO_SALTO = 10;

        // INICIALIZACIÓN
        cargarCancion(indiceCancionActual);
        audio.volume = controlVolumen.value / 100;


        // FUNCIONES AUXILIARES
        function formatearTiempo(segundos) {
            const min = Math.floor(segundos / 60);
            const seg = Math.floor(segundos % 60);
            return `${min}:${seg.toString().padStart(2, '0')}`;
        }

        function cargarCancion(indice) {
            const cancion = listaCanciones[indice];
            audio.src = cancion.archivo;
            
            // Actualizar en ambas vistas
            tituloCancionMenu.textContent = cancion.titulo;
            artistaCancionMenu.textContent = cancion.artista;
            tituloCancionGrande.textContent = cancion.titulo;
            artistaCancionGrande.textContent = cancion.artista;
            tiempoTotalMenu.textContent = formatearTiempo(cancion.duracion);
            tiempoTotalGrande.textContent = formatearTiempo(cancion.duracion);
            
            // Reiniciar progreso y letra
            indiceLetraActual = 0;
            textoLetra.textContent = "";
            barraProgresoMenu.style.width = "0%";
            barraProgresoGrande.style.width = "0%";
            tiempoActualMenu.textContent = "0:00";
            tiempoActualGrande.textContent = "0:00";

            // Actualizar interfaz de la lista
            itemsCanciones.forEach((item, i) => {
                if(i === indice) {
                    item.classList.add('bg-primario/90');
                    item.classList.remove('bg-gray-800');
                    item.querySelector('i').classList.add('text-white');
                    item.querySelector('i').classList.remove('text-gray-400');
                } else {
                    item.classList.remove('bg-primario/90');
                    item.classList.add('bg-gray-800');
                    item.querySelector('i').classList.remove('text-white');
                    item.querySelector('i').classList.add('text-gray-400');
                }
            });
        }

        function actualizarProgreso() {
            const progreso = (audio.currentTime / audio.duration) * 100;
            barraProgresoMenu.style.width = `${progreso}%`;
            barraProgresoGrande.style.width = `${progreso}%`;
            tiempoActualMenu.textContent = formatearTiempo(audio.currentTime);
            tiempoActualGrande.textContent = formatearTiempo(audio.currentTime);
        }
        function actualizarLetra() {
    if (!estaReproduciendo) return;
    const cancion = listaCanciones[indiceCancionActual];
    const tiempo = audio.currentTime;
    
    let indiceAnterior = indiceLetraActual;
    indiceLetraActual = 0;
    
    // ⭐ TOLERANCIA 0.3s = ANIMACIÓN VISIBLE (¡LO PRINCIPAL!)
    while (indiceLetraActual < cancion.letra.length - 1 && tiempo >= cancion.letra[indiceLetraActual + 1][0] + 0.3) {
        indiceLetraActual++;
    }

    if (indiceLetraActual !== indiceAnterior) {
        const elNuevo = document.getElementById('letra-anterior');
        const elActual = document.getElementById('texto-letra');
        const elPasado = document.getElementById('letra-siguiente');

        elNuevo.textContent = indiceLetraActual < cancion.letra.length - 1 ? cancion.letra[indiceLetraActual + 1][1] : "";
        elActual.textContent = cancion.letra[indiceLetraActual][1];
        elPasado.textContent = indiceLetraActual > 0 ? cancion.letra[indiceLetraActual - 1][1] : "";

        // Preparar invisible
        elNuevo.style.opacity = '0'; elNuevo.style.fontSize = '1.25rem'; elNuevo.style.transform = 'translateY(-40px)';
        elActual.style.opacity = '0'; elActual.style.fontSize = '1.875rem'; elActual.style.transform = 'translateY(0)';
        elPasado.style.opacity = '0'; elPasado.style.fontSize = '1.25rem'; elPasado.style.transform = 'translateY(40px)';

        requestAnimationFrame(() => {
            // ⭐ AHORA VERÁS: arriba→centro (brillante), centro→abajo, abajo→fuera
            elNuevo.style.opacity = '1'; elNuevo.style.fontSize = '1.875rem'; elNuevo.style.transform = 'translateY(0)';
            elNuevo.style.color = '#ffffff'; elNuevo.style.textShadow = '0 0 15px rgba(255,255,255,1), 0 0 30px rgba(255,255,255,0.8)';
            
            elActual.style.opacity = '0.4'; elActual.style.fontSize = '1.25rem'; elActual.style.transform = 'translateY(40px)';
            
            elPasado.style.opacity = '0'; elPasado.style.transform = 'translateY(80px)';
        });

        setTimeout(() => {
            elPasado.style.opacity = '0'; elPasado.style.fontSize = '1.25rem'; elPasado.style.transform = 'translateY(-40px)';
        }, 1200);
    }
}

        function abrirVistaReproduccion() {
            vistaReproduccion.classList.remove('translate-x-full');
            vistaReproduccion.classList.add('translate-x-0');
            actualizarLetra();
            // Mostrar el título primero y programar su desaparición
     tituloCancionGrande.style.opacity = '1';
     artistaCancionGrande.style.opacity = '1';
     tituloCancionGrande.style.transition = 'opacity 0.5s ease';
     artistaCancionGrande.style.transition = 'opacity 0.5s ease';
     
     // Limpiar temporizador anterior si existe (para que no se ejecute antes de tiempo)
     if(window.temporizadorOcultarTitulo) {
         clearTimeout(window.temporizadorOcultarTitulo);
     }
     
     // Ocultar después de 14 segundos
     window.temporizadorOcultarTitulo = setTimeout(() => {
         tituloCancionGrande.style.opacity = '0';
         artistaCancionGrande.style.opacity = '0';
     }, 14000); // 14000 milisegundos = 14 segundos
 }

        function cerrarVistaReproduccion() {
            vistaReproduccion.classList.remove('translate-x-0');
            vistaReproduccion.classList.add('translate-x-full');
        }

        function alternarReproduccion() {
            if (estaReproduciendo) {
                audio.pause();
                botonPlayMenu.innerHTML = '<i class="fa fa-play"></i>';
                botonPlayGrande.innerHTML = '<i class="fa fa-play"></i>';
                estaReproduciendo = false;
            } else {
                audio.play();
                botonPlayMenu.innerHTML = '<i class="fa fa-pause"></i>';
                botonPlayGrande.innerHTML = '<i class="fa fa-pause"></i>';
                estaReproduciendo = true;
                abrirVistaReproduccion();
            }
        }


        // EVENTOS DE CONTROL
        botonPlayMenu.addEventListener('click', alternarReproduccion);
        botonPlayGrande.addEventListener('click', alternarReproduccion);

        botonRegresar.addEventListener('click', cerrarVistaReproduccion);

        // Retroceder
        function retroceder() {
            audio.currentTime = Math.max(0, audio.currentTime - TIEMPO_SALTO);
        }
        botonRetrocederMenu.addEventListener('click', retroceder);
        botonRetrocederGrande.addEventListener('click', retroceder);

        // Adelantar
        function adelantar() {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + TIEMPO_SALTO);
        }
        botonAdelantarMenu.addEventListener('click', adelantar);
        botonAdelantarGrande.addEventListener('click', adelantar);

        // Click en barra de progreso (menú)
        barraContenedorMenu.addEventListener('click', (e) => {
            const anchoTotal = barraContenedorMenu.clientWidth;
            const posicionClick = e.offsetX;
            const porcentaje = posicionClick / anchoTotal;
            audio.currentTime = porcentaje * audio.duration;
        });

        // Click en barra de progreso (vista grande)
        barraContenedorGrande.addEventListener('click', (e) => {
            const anchoTotal = barraContenedorGrande.clientWidth;
            const posicionClick = e.offsetX;
            const porcentaje = posicionClick / anchoTotal;
            audio.currentTime = porcentaje * audio.duration;
        });

        // Control de volumen
        controlVolumen.addEventListener('input', () => {
            const vol = controlVolumen.value / 100;
            audio.volume = vol;
            valorVolumen.textContent = controlVolumen.value;

            if(vol === 0) {
                iconoVolumen.className = "fa fa-volume-off text-white";
            } else if(vol < 0.5) {
                iconoVolumen.className = "fa fa-volume-down text-white";
            } else {
                iconoVolumen.className = "fa fa-volume-up text-white";
            }
        });

        // Cambiar canción desde la lista
        itemsCanciones.forEach(item => {
            item.addEventListener('click', () => {
                const nuevoIndice = parseInt(item.dataset.indice);
                if(nuevoIndice !== indiceCancionActual) {
                    indiceCancionActual = nuevoIndice;
                    cargarCancion(indiceCancionActual);
                    if(estaReproduciendo) {
                        audio.play();
                    }
                }
                const tituloCancionMenu = document.getElementById('titulo-cancion-menu');
            });
        });

        // Cuando termina la canción, pasar a la siguiente
        audio.addEventListener('ended', () => {
            indiceCancionActual = (indiceCancionActual + 1) % listaCanciones.length;
            cargarCancion(indiceCancionActual);
            audio.play();
        });

        // Actualizaciones en tiempo real
        audio.addEventListener('timeupdate', () => {
            actualizarProgreso();
            actualizarLetra();
        });

        // Cargar duración real al cargar el archivo
        audio.addEventListener('loadedmetadata', () => {
            tiempoTotalMenu.textContent = formatearTiempo(audio.duration);
            tiempoTotalGrande.textContent = formatearTiempo(audio.duration);
        });
// Abrir vista de letra al hacer clic en el título del reproductor
    tituloCancionMenu.addEventListener('click', abrirVistaReproduccion);
    </script>
</body>
</html>
